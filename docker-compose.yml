services:
  mongo:
    image: mongo:7
    container_name: queue-booking-db
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # ไม่ expose port ออกนอก network เพื่อความปลอดภัย
    # ถ้าอยากต่อด้วย MongoDB Compass ให้เปิดบรรทัดล่างนี้
    # ports:
    #   - "27017:27017"

  backend:
    build: ./backend
    container_name: queue-booking-api
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/queue-booking
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
    depends_on:
      - mongo
    ports:
      # macOS ใช้ port 5000 กับ AirPlay จึง map ออกเป็น 5001 แทน
      - "5001:5000"

  frontend:
    build: ./frontend
    container_name: queue-booking-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  mongo-data:
